poll_interval_seconds: 600
output_path: output/llm_routing.jsonl

encoder:
  window_points: 32
  stride_points: 8
  baseline_period: 60

llm_probe:
  output_path: output/probes/llm_probe.jsonl
  input_glob: output/probes/*.jsonl
  prompt: "Reply with exactly: OK"
  connect_timeout_seconds: 10
  request_timeout_seconds: 30
  targets:
    - provider: openai
      model: gpt-4o-mini
      api_key_env: OPENAI_API_KEY
      max_completion_tokens: 4

    - provider: anthropic
      model: claude-haiku-4-5-20251001
      api_key_env: ANTHROPIC_API_KEY
      max_completion_tokens: 4

    - provider: groq
      model: llama-3.1-8b-instant
      api_key_env: GROQ
      max_completion_tokens: 4

metrics:
  - metric_id: openai.gpt-4o-mini.ttft_ms
    provider: llm_probe
    lookback_points: 64
    period_seconds: 30
    labels:
      role: llm-routing
      provider: openai
      signal: ttft_ms

  - metric_id: anthropic.claude-haiku-4-5-20251001.ttft_ms
    provider: llm_probe
    lookback_points: 64
    period_seconds: 30
    labels:
      role: llm-routing
      provider: anthropic
      signal: ttft_ms

  - metric_id: groq.llama-3.1-8b-instant.tps
    provider: llm_probe
    lookback_points: 64
    period_seconds: 30
    labels:
      role: llm-routing
      provider: groq
      signal: tps

routing:
  primary_target: anthropic.claude-haiku-4-5-20251001
  provider_priority:
    - anthropic.claude-haiku-4-5-20251001
    - openai.gpt-4o-mini
    - groq.llama-3.1-8b-instant

  structural_policy:
    hazard_floor: 0.75
    rupture_floor: 0.35
    score_observe_threshold: 0.95
    score_route_threshold: 1.05
    cooldown_windows: 4
    recovery_windows: 8

  timeout_policy:
    ttft_timeout_ms: 10000
    recovery_ttft_ms: 2500
    cooldown_points: 1
    recovery_windows: 4

replay:
  structural_metric_id: anthropic.claude-haiku-4-5-20251001.ttft_ms
  source_glob: output/probes/*.jsonl
  output_dir: output/llm_replay
