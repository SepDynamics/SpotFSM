poll_interval_seconds: 30
output_path: output/telemetry_bridge.jsonl

encoder:
  window_points: 64
  stride_points: 16
  baseline_period: 60

prometheus:
  base_url: http://localhost:9090
  timeout_seconds: 10

cloudwatch:
  region: us-east-1
  profile:

metrics:
  - metric_id: api_gateway_latency_p95
    provider: prometheus
    query: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job="api-gateway"}[5m])))
    period_seconds: 60
    lookback_points: 96
    labels:
      role: app-health
      signal: latency-p95
      workload: api-gateway

  - metric_id: worker_queue_depth
    provider: cloudwatch
    namespace: AWS/SQS
    metric_name: ApproximateNumberOfMessagesVisible
    statistic: Maximum
    period_seconds: 60
    lookback_points: 96
    dimensions:
      QueueName: inference-worker
    labels:
      role: app-health
      signal: queue-depth
